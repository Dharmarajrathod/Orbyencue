<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORBYNECUE</title>
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div class="appShell">
      <aside class="sidebar" aria-label="ORBYNECUE navigation">
        <button id="newChat" type="button" class="newChatButton">New Chat</button>

        <section class="sideSection" aria-labelledby="recentTitle">
          <div class="sideHeader">
            <h2 id="recentTitle">Recent Conversations</h2>
          </div>
          <div id="historyList" class="historyList"></div>
        </section>

        <section class="sideSection" aria-labelledby="documentsTitle">
          <div class="sideHeader">
            <h2 id="documentsTitle">Documents Library</h2>
            <span id="knowledgeStatus">0 loaded</span>
          </div>
          <label id="documentDropzone" class="documentDropzone" for="knowledgeFile">
            <input id="knowledgeFile" type="file" multiple accept=".txt,.md,.csv,.json,.pdf,.doc,.docx,.ppt,.pptx,application/pdf,application/msword,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation">
            <strong>Upload Documents</strong>
            <span>Drop PDF, DOCX, PPTX, TXT, CSV, JSON, or Markdown</span>
          </label>
          <div id="documentList" class="documentList"></div>
        </section>

        <div class="sidebarFooter">
          <button id="settingsButton" type="button" class="ghostButton">Settings</button>
          <button id="clearHistory" type="button" class="ghostButton">Clear Chat</button>
        </div>
      </aside>

      <main class="chatWorkspace" aria-label="ORBYNECUE chat workspace">
        <header class="statusBar" aria-label="Workspace status">
          <span id="connectionStatus" class="statusPill neutral">Checking backend</span>
          <span id="audioSharedStatus" class="statusPill neutral">Audio Not Shared</span>
          <span id="listeningStatus" class="statusPill neutral">Idle</span>
          <span id="processingStatus" class="statusPill neutral">Idle</span>
          <span id="documentsStatus" class="statusPill neutral">0 Documents Loaded</span>
        </header>

        <section class="welcomePanel" aria-label="ORBYNECUE meeting intelligence controls">
          <img src="logo.png" alt="" class="welcomeLogo">
          <h1>ORBYNECUE</h1>
          <p>Meeting questions, document context, and AI answers from live meeting audio and uploaded knowledge sources.</p>

          <div class="audioControls" aria-label="Meeting audio controls">
            <button id="startMeetingAudio" type="button">Share Meeting Audio</button>
            <div class="listenRow">
              <button id="startListening" type="button" class="secondary" disabled>Listen</button>
              <button id="stopListening" type="button" class="danger" disabled>Stop</button>
            </div>
            <div class="audioStatusLine">
              <span id="meetingAudioStatus">Not shared</span>
              <div class="audioLevel" aria-hidden="true">
                <span id="meetingAudioLevel"></span>
              </div>
            </div>
          </div>
        </section>

        <section class="conversationWrap" aria-live="polite">
          <div id="contextIndicator" class="contextIndicator">Idle</div>
          <div id="chatMessages" class="chatMessages"></div>
        </section>

        <form id="chatForm" class="chatComposer" aria-label="Ask ORBYNECUE">
          <label class="attachButton" for="composerFile" aria-label="Attach documents">+</label>
          <input id="composerFile" type="file" multiple accept=".txt,.md,.csv,.json,.pdf,.doc,.docx,.ppt,.pptx,application/pdf,application/msword,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation">
          <textarea id="manualQuestion" rows="1" placeholder="Ask about your meeting, uploaded documents, or both..."></textarea>
          <button id="askQuestion" type="submit">Send</button>
        </form>
      </main>
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
