services:
  - type: web
    name: orbynecue-gemini-backend
    runtime: python
    buildCommand: pip install -r backend-requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODELS
        value: gemini-2.5-flash-lite,gemini-2.5-flash,gemini-2.0-flash
      - key: ALLOWED_ORIGINS
        value: '*'
